name: Arena Daily Watcher

on:
  schedule:
    # Weekdays at 8:05 AM PDT (15:05 UTC in summer / 16:05 UTC in winter)
    # Using 15:05 UTC — runs at 8:05 AM PDT, 7:05 AM PST
    - cron: "5 15 * * 1-5"
    # Weekdays at 12:05 PM PST (20:05 UTC) — runs at 12:05 PM PST, 1:05 PM PDT
    - cron: "5 20 * * 1-5"
  workflow_dispatch: {}   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Generate report
        env:
          ARENA_EMAIL: ${{ secrets.ARENA_EMAIL }}
          ARENA_PASSWORD: ${{ secrets.ARENA_PASSWORD }}
          ARENA_WORKSPACE_ID: ${{ secrets.ARENA_WORKSPACE_ID }}
        run: python generate_report.py

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
